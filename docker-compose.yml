services:
  mongodb:
    image: mongo:7.0
    container_name: food-chain-rumble-db
    restart: always
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: foodchain2024
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data: